<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Availability Summary</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6fa;color:#1a1a1a}
.wrap{max-width:920px;margin:0 auto;padding:28px 18px}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px}
h1{font-size:24px;margin:0}
.sub{color:#667085;font-size:13px;margin-top:6px}
input{border:1px solid #d0d5dd;border-radius:8px;padding:8px 10px;font-size:14px}
.grid{display:grid;gap:12px}
.card{background:#fff;border:1px solid #e4e6eb;border-radius:10px;padding:14px 16px}
.meta{display:flex;justify-content:space-between;gap:12px;margin-bottom:8px}
.name{font-weight:700;color:#1456f0}
.time{font-size:12px;color:#98a2b3}
.text{white-space:pre-wrap;line-height:1.48;font-size:14px}
.empty{padding:48px 16px;text-align:center;color:#98a2b3;background:#fff;border:1px dashed #d0d5dd;border-radius:10px}
</style>
</head>
<body>
<main class="wrap">
  <div class="head">
    <div>
      <h1>Availability Summary</h1>
      <div class="sub" id="summary">Loading...</div>
    </div>
    <input id="week" type="date">
  </div>
  <div class="grid" id="list"></div>
</main>
<script>
const REPORT_URL='https://gmfggasqezvcisfdckkj.functions.supabase.co/availability-report';
const params=new URLSearchParams(location.search);
function pad(n){return String(n).padStart(2,'0');}
function dateKey(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function nextMonday(){
  const d=new Date();
  const day=d.getDay();
  d.setDate(d.getDate()+(day===0?1:8-day));
  return dateKey(d);
}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
async function load(){
  const week=document.getElementById('week').value;
  const res=await fetch(`${REPORT_URL}?week_start=${encodeURIComponent(week)}`);
  const data=await res.json();
  const rows=data.submissions||[];
  document.getElementById('summary').textContent=`Week start: ${data.weekStart||week} · ${rows.length} submission${rows.length===1?'':'s'}`;
  const list=document.getElementById('list');
  if(!rows.length){
    list.innerHTML='<div class="empty">No availability submitted yet.</div>';
    return;
  }
  list.innerHTML=rows.map(r=>`
    <section class="card">
      <div class="meta">
        <div class="name">${esc(r.staff_name)}</div>
        <div class="time">${esc(new Date(r.created_at).toLocaleString())}</div>
      </div>
      <div class="text">${esc(r.availability_text)}</div>
    </section>
  `).join('');
}
const weekInput=document.getElementById('week');
weekInput.value=params.get('week_start')||nextMonday();
weekInput.addEventListener('change',load);
load().catch(()=>{document.getElementById('list').innerHTML='<div class="empty">Unable to load report.</div>';});
</script>
</body>
</html>
